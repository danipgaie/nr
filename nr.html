<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Night Noise Recorder - Mobile</title>
<style>
html, body { margin:0; padding:0; background-color:#0d0d0d; color:#e0e0e0; font-family:sans-serif; height:100%; }
body { display:flex; flex-direction:column; }
h2,h3 { text-align:center; margin:5px 0; }
#configPanel { padding:10px; margin:5px 10px; background:#1a1a1a; border-radius:5px; }
#configPanel label { margin-right:15px; }
input[type="number"] { width:60px; background:#0d0d0d; color:#e0e0e0; border:1px solid #444; border-radius:4px; padding:2px 5px; }
#controls { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); display:flex; gap:10px; z-index:100; }
button { background-color:#1a1a1a; color:#e0e0e0; border:1px solid #444; padding:12px 18px; border-radius:8px; font-size:16px; }
button:hover { background-color:#333; }
#recordings { flex:1; margin:10px; overflow-y:auto; }
li { list-style:none; display:flex; align-items:center; margin-bottom:8px; }
span.filename { flex:1; margin-left:5px; font-size:14px; }
a { color:#90caf9; text-decoration:none; margin-left:5px; font-size:14px; }
#logsContainer { position:fixed; bottom:70px; left:10px; right:10px; max-height:200px; background-color:#1a1a1a; padding:5px; border-radius:5px; font-family:monospace; overflow-y:auto; display:none; z-index:99; }
</style>
</head>
<body>

<h2>🌙 Night Noise Recorder</h2>

<div id="configPanel">
  <h3>Settings</h3>
  <label>Threshold: <input type="number" id="thresholdInput" value="10" min="1" max="100"></label>
  <label>Silence Delay (ms): <input type="number" id="silenceInput" value="1000" min="500" max="30000"></label>
</div>

<div id="recordings">
  <ul id="recordingsList"></ul>
</div>

<div id="logsContainer"><div id="log"></div></div>

<div id="controls">
  <button id="start">Start</button>
  <button id="stop" disabled>Stop</button>
  <button id="toggleLogs">Logs</button>
  <button id="clearLogs">Clear</button>
  <button id="downloadAllZipBatch">💾 Download All ZIP (Batched)</button>
</div>

<!-- Include JSZip from CDN -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<script>
let mediaRecorder, chunks=[], recording=false, monitoring=false, silenceTimer;
let wakeLock=null, keepAwakeAudio=null;
let THRESHOLD=parseInt(document.getElementById("thresholdInput").value,10);
let SILENCE_DELAY=parseInt(document.getElementById("silenceInput").value,10);
const logDiv=document.getElementById("log");
const recordingsList=document.getElementById("recordingsList");
let currentAudio=null, currentBtn=null;

function log(msg){ const now=new Date(); logDiv.innerHTML+=`<div>[${now.toLocaleTimeString()}] ${msg}</div>`; logDiv.scrollTop=logDiv.scrollHeight; }

document.getElementById("thresholdInput").onchange=e=>{THRESHOLD=parseInt(e.target.value,10); log(`Threshold set to ${THRESHOLD}`);};
document.getElementById("silenceInput").onchange=e=>{SILENCE_DELAY=parseInt(e.target.value,10); log(`Silence Delay set to ${SILENCE_DELAY} ms`);};
document.getElementById("toggleLogs").onclick=()=>{ const c=document.getElementById("logsContainer"); c.style.display=c.style.display==="none"?"block":"none"; };
document.getElementById("clearLogs").onclick=()=>logDiv.innerHTML="";

// -------- Browser capability check --------
function checkBrowserSupport(){
  if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) && 
     !(navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia)){
    log("⚠️ Microphone access not supported on this browser. Recording disabled.");
    alert("⚠️ Your browser does not support microphone recording. Please use Chrome, Firefox, or Safari.");
    document.getElementById("start").disabled=true;
    return false;
  }
  return true;
}
if(!checkBrowserSupport()) console.warn("Unsupported browser");


// -------- Wake Lock --------
async function requestWakeLock(){
  if('wakeLock' in navigator && navigator.wakeLock.request){
    try{
      wakeLock=await navigator.wakeLock.request('screen');
      log("🔆 Screen wake lock active (native)");
      wakeLock.addEventListener('release',()=>{ log("💤 Wake lock released, reacquiring..."); requestWakeLock(); });
    }catch(e){ log("⚠️ Native wake lock failed: "+e.message); startHiddenAudioWakeLock(); }
  }else startHiddenAudioWakeLock();
}
function releaseWakeLock(){
  if(wakeLock){ wakeLock.release(); wakeLock=null; log("💤 Native wake lock released"); }
  stopHiddenAudioWakeLock();
}
function startHiddenAudioWakeLock(){
  if(keepAwakeAudio) return;
  keepAwakeAudio=document.createElement('audio');
  // keepAwakeAudio.src="silent.mp3"; // Provide a real small silent MP3
  // 1-second silent MP3 Base64 (minimal valid file)
  keepAwakeAudio.src = "data:audio/mpeg;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAACcQCAAwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA";
  keepAwakeAudio.loop=true;
  keepAwakeAudio.muted=true;
  keepAwakeAudio.play().then(()=>log("🔆 Hidden audio wake lock active (fallback)"))
    .catch(err=>log("⚠️ Hidden audio wake lock failed: "+err.message));
  keepAwakeAudio.style.display="none";
  document.body.appendChild(keepAwakeAudio);
}
function stopHiddenAudioWakeLock(){
  if(!keepAwakeAudio) return;
  keepAwakeAudio.pause();
  keepAwakeAudio.remove();
  keepAwakeAudio=null;
  log("💤 Hidden audio wake lock released");
}


function saveRecording(blob){
  const now = new Date();
  const timestamp = now.toLocaleString().replace(/[/, :]/g,'-'); // for filename
  const filename = `noise-${timestamp}.webm`;
  const localTimeStr = now.toLocaleString(); // fixed local time for display

  const url = URL.createObjectURL(blob);
  const li = document.createElement("li");

  const playBtn = document.createElement("button");
  playBtn.textContent = "▶";

  const delBtn = document.createElement("button");
  delBtn.textContent = "🗑";

  const textSpan = document.createElement("span");
  textSpan.className = "filename";
  textSpan.textContent = `${filename} (${localTimeStr}) [00:00]`; // use fixed time

  const downloadLink = document.createElement("a");
  downloadLink.href = url;
  downloadLink.download = filename;
  downloadLink.textContent = "💾";

  li.appendChild(playBtn);
  li.appendChild(delBtn);
  li.appendChild(downloadLink);
  li.appendChild(textSpan);
  recordingsList.appendChild(li);
  recordingsList.scrollTop = recordingsList.scrollHeight;

  const audio = new Audio(url);
  let interval;

  playBtn.onclick = () => {
    if (audio.paused) {
      if (currentAudio) {
        currentAudio.pause();
        if (currentBtn) currentBtn.textContent = "▶";
        clearInterval(interval);
      }
      audio.play();
      playBtn.textContent = "⏸";
      currentAudio = audio;
      currentBtn = playBtn;

      interval = setInterval(() => {
        const min = String(Math.floor(audio.currentTime/60)).padStart(2,'0');
        const sec = String(Math.floor(audio.currentTime%60)).padStart(2,'0');
        textSpan.textContent = `${filename} (${localTimeStr}) [${min}:${sec}]`; // use fixed local time
      }, 500);
      log(`Playing ${filename}`);
    } else {
      audio.pause();
      playBtn.textContent = "▶";
      clearInterval(interval);
      log(`Paused ${filename}`);
    }
  };

  audio.onended = () => {
    playBtn.textContent = "▶";
    clearInterval(interval);
    currentAudio = null;
    currentBtn = null;
  };

  delBtn.onclick = () => {
    li.remove();
    log(`Deleted ${filename}`);
  };

  log(`Saved: ${filename}`);
}

async function ensureJSZip() {
    if (typeof JSZip === 'undefined') {
        console.log('JSZip missing, reloading...');
        await new Promise((resolve) => {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
            script.onload = resolve;
            document.head.appendChild(script);
        });
        console.log('JSZip reloaded!');
    }
    return JSZip;
}

document.getElementById("downloadAllZipBatch").onclick = async function() {
    const JSZipLib = await ensureJSZip(); // make sure JSZip exists
    const zip = new JSZipLib();
    console.log('Download triggered with JSZip available');
    // rest of your zip code
};

// Batch ZIP download
document.getElementById("downloadAllZipBatch").onclick=async function(){
  const batchSize=500;
  console.log("download batch clicked!");

  const JSZipLib = await ensureJSZip(); // make sure JSZip exists
  const zip = new JSZipLib();
  console.log('Download triggered with JSZip available');
  const links=Array.from(document.querySelectorAll("#recordingsList a[download]"));
  if(!links.length){ alert("No recordings to download."); return; }

  let count=0;
  console.log(`⏳ Preparing ZIP for ${links.length} recordings in batches of ${batchSize}...`);

  for(let i=0;i<links.length;i+=batchSize){
    const batch=links.slice(i,i+batchSize);
    console.log(`⏳ Processing batch ${i/batchSize+1} (${batch.length} recordings)...`);
    await Promise.all(batch.map(async a=>{
      try{
        const resp=await fetch(a.href);
        if(!resp.ok) throw new Error("Blob URL invalid");
        const blob=await resp.blob();
        zip.file(a.getAttribute("download"),blob);
        count++;
        console.log(`✅ Added ${a.getAttribute("download")} (${count}/${links.length})`);
      }catch(e){ console.warn(`⚠ Skipping expired recording: ${a.getAttribute("download")}`);}
    }));
  }

  if(count===0){ alert("No valid recordings to include in ZIP."); return; }

  console.log("⏳ Generating ZIP file...");
  const content=await zip.generateAsync({type:"blob"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(content);
  link.download=`recordings_${new Date().toLocaleDateString().replace(/\//g,'-')}.zip`;
  link.click();
  console.log(`✅ ZIP created with ${count} recordings`);
};

// Monitoring
async function startMonitoring(){
  try{
    await requestWakeLock();

    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const audioContext=new AudioContext();
    const source=audioContext.createMediaStreamSource(stream);
    const analyser=audioContext.createAnalyser(); analyser.fftSize=512;
    source.connect(analyser);
    const dataArray=new Uint8Array(analyser.frequencyBinCount);

    mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>chunks.push(e.data);
    mediaRecorder.onstop=()=>{ const blob=new Blob(chunks,{type:"audio/webm"}); chunks=[]; saveRecording(blob); recording=false; };

    monitoring=true;
    function detectSound(){
      if(!monitoring) return;
      analyser.getByteFrequencyData(dataArray);
      const volume=dataArray.reduce((a,b)=>a+b,0)/dataArray.length;
      if(volume>THRESHOLD){
        if(!recording){ mediaRecorder.start(); recording=true; log("🔴 Recording started"); }
        clearTimeout(silenceTimer);
        silenceTimer=setTimeout(()=>{ if(recording){ mediaRecorder.stop(); log("⏹ Recording stopped"); } },SILENCE_DELAY);
      }
      requestAnimationFrame(detectSound);
    }
    detectSound();
    log("🎧 Monitoring started");
    document.getElementById("start").disabled=true;
    document.getElementById("stop").disabled=false;
  }catch(e){ log(`❌ Error starting monitoring: ${e.message}`);}
}

function stopMonitoring(){
  monitoring=false;
  if(recording){ mediaRecorder.stop(); log("⏹ Recording stopped (manual)"); }
  releaseWakeLock();
  log("🛑 Monitoring stopped");
  document.getElementById("start").disabled=false;
  document.getElementById("stop").disabled=true;
}

document.getElementById("start").onclick=startMonitoring;
document.getElementById("stop").onclick=stopMonitoring;
</script>
</body>
</html>
